<!-- HTML file defines the sturcutre of the multiplication table game
	Includes:
		 user input field and button to generate table
		 placeholder image displayed on the main page
		 containers for the generated table
		 timer display and result/feedback messages
 -->

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Multiplication Table Game</title>
	<link rel="stylesheet" href="PA3.css">
	<link rel="icon" type="image/jpeg" href="Images/MultSymbol.jpg"/>
</head>

<body>
	<h1>The Multiplication Table Challenge</h1>
	<!-- user input section to enter number that will determine table size + instructions -->
	<div id="input-section">
		<input type="text" id="tableSize" placeholder="Enter a number of max 20">
		<button id="generateBtn">Generate Table</button>

		<p id="instructions" class="instruction-text">
			Enter a number and press <strong>Enter</strong> or click <strong>Generate Table</strong>
		</p>
		<p id="error-message"></p>
	</div>

	<div class="image-container">
		<img src="Images/MathCoverPhoto.jpg" alt="Multiplication Placeholder Image">
	</div>


	<!-- Mult. table here (determined by js) -->
	<div id="table-container">

    </div>

    <p id="table-instructions" class="instruction-text">
    	Enter your answer and press <strong>Enter</strong>, or wait for the timer to run out.
    </p>

	<!-- Timer -->
	<div id="timer"></div>

	<!-- Result message -->
	<div id="result-message"></div>
	
	<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
	<script src="PA3.js"></script>
</body>
</html>
