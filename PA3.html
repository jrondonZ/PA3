<!-- HTML for multiplication table generator -->

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Multiplication Table Game</title>
	<link rel="stylesheet" href="PA3.css">
	<link rel="icon" type="image/jpeg" href="Images/MultSymbol.jpg"/>
</head>

<body>
	<h1>The Multiplication Table Challenge</h1>
	<!-- user input section to enter number that will determine table size-->
	<div id="input-section">
		<input type="text" id="tableSize" placeholder="Enter a number of max 20">
		<button id="generateBtn">Generate Table</button>
		<p id="error-message"></p>
	</div>
	
	<!-- Placeholder Image
	<div id="Placeholder">
		<img src="Images/MathCoverPhoto.jpg" alt="Multiplication Placeholder Image">
	</div>
	-->

	<div class="image-container">
		<img src="Images/MathCoverPhoto.jpg" alt="Multiplication Placeholder Image">
	</div>


	<!-- Mult. table here (determined by js) -->
	<div id="table-container">
		<!-- hard code table to test out css -->
		<table>

			<tr>
            	<td>1</td><td>2</td><td>3</td><td>4</td><td>1</td><td>2</td><td>3</td><td>4</td>
        	</tr>
        	<tr>
            	<td>2</td><td>4</td><td>6</td><td>8</td><td>2</td><td>4</td><td>6</td><td>8</td>
        	</tr>
        	<tr>
            	<td>3</td><td>6</td><td><input type="text"></td><td>12</td><td>3</td><td>6</td><td>7</td><td>12</td>
        	</tr>
        <tr>
            <td>4</td><td>8</td><td>12</td><td>16</td><td>4</td><td>8</td><td>12</td><td>16</td>
        </tr>

    	</table>
    </div>

	<!-- Timer -->
	<div id="timer"></div>

	<!-- Result message -->
	<div id="result-message"></div>

	<script src="PA3.js"></script>
</body>
</html>
